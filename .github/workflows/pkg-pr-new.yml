name: pkg.pr.new

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck packages
        run: bunx turbo run typecheck --filter='@formadapter/react'

      - name: Test packages
        run: bunx turbo run test --filter='@formadapter/react'

      - name: Build packages
        run: bunx turbo run build --filter='@formadapter/react'

      - name: Publish preview packages
        run: npx pkg-pr-new publish --comment=update --packageManager=bun './packages/react'
