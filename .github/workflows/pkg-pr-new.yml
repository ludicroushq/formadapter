name: pkg.pr.new

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck packages
        run: bunx turbo run typecheck --filter='./packages/*'

      - name: Test packages
        run: bunx turbo run test --filter='./packages/*'

      - name: Build packages
        run: bunx turbo run build --filter='./packages/*'

      - name: Verify package artifacts
        run: bun tooling/package-artifacts.ts

      - name: Publish preview packages
        run: bun run preview:publish
